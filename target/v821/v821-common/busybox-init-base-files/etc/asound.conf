#we define pcm capture plugin naming convention:
#pcm.Capture<n>Mic:<SampleRate>, <n>: the number of MIC. It can auto convert to indicated channels. <SampleRate>: set sample rate to Hardware PCM.
#pcm.Capture<n>MicPlusAec, if enable aec, add PlusAec. It forbids to auto convert to multi channels because of aec.
# ref to GenerateCaptureIdentifier() in [audio_hw.c]
#e.g.:
#pcm.Capture1Mic:16000
#pcm.Capture1MicPlusAec
#pcm.Capture2Mic:16000
#pcm.Capture2MicPlusAec
pcm.Capture1Mic {
    @args [ SAMPLERATE ]
    @args.SAMPLERATE {
        type integer
        default 16000
    }
    type hooks
    slave.pcm {
        type plug
        slave {
            pcm "hw:audiocodec,0"
            channels 1
            rate $SAMPLERATE
        }
    }
    hooks.0 {
        type ctl_elems
        hook_args HookArgsCapture
    }
}

pcm.Capture1MicHard {
    type hooks
    slave.pcm "hw:audiocodec,0"
    hooks.0 {
        type ctl_elems
        hook_args HookArgsCapture
    }
}
pcm.Capture1MicPlusAec {
    type route
    slave.pcm {
        type multi
        slaves {
            a {pcm Capture1MicHard channels 1}
            b {pcm I2SRX channels 1}
        }
        bindings {
            0 {slave a channel 0}
            1 {slave b channel 0}
        }
    }
    ttable.0.0 1
    ttable.1.1 1
}

pcm.Capture2Mic {
    @args [ SAMPLERATE ]
    @args.SAMPLERATE {
        type integer
        default 16000
    }
    type hooks
    slave.pcm {
        type plug
        slave {
            pcm "hw:audiocodec,0"
            channels 2
            rate $SAMPLERATE
        }
    }
    hooks.0 {
        type ctl_elems
        hook_args HookArgsCapture2Mic
    }
}

pcm.Capture2MicHard {
    type hooks
    slave.pcm "hw:audiocodec,0"
    hooks.0 {
        type ctl_elems
        hook_args HookArgsCapture2Mic
    }
}
pcm.Capture2MicPlusAec {
    type route
    slave.pcm {
        type multi
        slaves {
            a {pcm Capture2MicHard channels 2}
            b {pcm I2SRX channels 1}
        }
        bindings {
            0 {slave a channel 0}
            1 {slave a channel 1}
            2 {slave b channel 0}
        }
    }
    ttable.0.0 1
    ttable.1.1 1
    ttable.2.2 1
}

pcm.PlaybackEQ {
    type plug
    slave.pcm {
        type awequal
        slave.pcm "PlaybackRateDmix"
        config_file "/etc/awequal.conf"
        tuning_support false
        verbose true
    }
    slave.rate 48000
    slave.format S16_LE
    slave.channels 2
}

pcm.awresample {
    type plug
    slave {
        pcm "hw:audiocodec,0"
        format S16_LE
        rate 16000
        channels 1
    }
    rate_converter "awrate"
}