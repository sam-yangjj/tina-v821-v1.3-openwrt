pcm.!default {
    type hooks
    slave {
        pcm {
            type asym
            playback.pcm "hw:{CARD=audiocodec, DEV=0}"
            capture.pcm "hw:audiocodec,0"
        }
    }
    hooks.0 {
        type ctl_elems
        hook_args HookArgsDefault
    }
}

pcm.PlaybackRateDmix {
    @args [ SAMPLERATE CHNNUM PERIODSIZE ]
    @args.SAMPLERATE {
        type integer
        default 16000
    }
    @args.CHNNUM {
        type integer
        default 1
    }
    @args.PERIODSIZE {
        type integer
        default 960 #1024
    }
    type plug
    slave.pcm {
        type softvol
        slave.pcm {
            type hooks
            slave.pcm {
                type dmix
                ipc_key 1111
                ipc_perm 0666
                slave {
                    pcm "hw:audiocodec,0"
                    format S16_LE
                    rate        $SAMPLERATE
                    channels    $CHNNUM
                    period_size $PERIODSIZE
                    periods 8
                }
            }
            hooks.0 {
                type ctl_elems
                hook_args HookArgsPlayback
            }
        }
        control {
            name "Soft Volume Master"
            card audiocodec
            count 1
        }
        min_dB -26.0
        max_dB 25.0
        resolution 256
    }
    rate_converter "linear" #"speexrate"
}

#pcm.resample rely on alsa-plugin and libspeexdsp. Select them in menuconfig if we want to use plugin pcm.resample.
pcm.resample {
    type plug
    slave {
        pcm "hw:audiocodec,0"
        format S16_LE
        rate 16000
        channels 1
    }
    rate_converter "speexrate"
}

pcm.CaptureMic Capture1MicHard

# I2SRTX's I2S_SAMPLERATE and I2S_CHNNUM must be same to PlaybackRateDmix's SAMPLERATE and CHNNUM!
#I2STX is used to transport ref pcm data.
pcm.I2STX {
    @args [ I2S_SAMPLERATE I2S_CHNNUM ]
    @args.I2S_SAMPLERATE {
        type integer
        default 16000
    }
    @args.I2S_CHNNUM {
        type integer
        default 1
    }
    type hooks
    slave.pcm {
        type plug
        slave {
            pcm "hw:sndi2s0,0"
            channels $I2S_CHNNUM
            rate $I2S_SAMPLERATE
        }
    }
    hooks.0 {
        type ctl_elems
        hook_args [
            {
                name "tx hub mode"
                preserve false
                optional true
                value 1
            }
            {
                name "loopback debug"
                preserve false
                optional true
                value 1
            }
        ]
    }
}
#I2SRX is used to receive ref pcm data.
pcm.I2SRX {
    @args [ I2S_SAMPLERATE I2S_CHNNUM ]
    @args.I2S_SAMPLERATE {
        type integer
        default 16000
    }
    @args.I2S_CHNNUM {
        type integer
        default 1
    }
    type hooks
    slave.pcm {
        type plug
        slave {
            pcm "hw:sndi2s0,0"
            channels $I2S_CHNNUM
            rate $I2S_SAMPLERATE
        }
    }
    hooks.0 {
        type ctl_elems
        hook_args [
            {
                name "tx hub mode"
                preserve false
                optional true
                value 1
            }
            {
                name "loopback debug"
                preserve false
                optional true
                value 1
            }
            {
                name "rx sync mode"
                preserve false
                optional true
                value 1
            }
        ]
    }
}

